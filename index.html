<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialMind AI - LinkedIn Post Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .result.active {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-header h3 {
            color: #667eea;
            font-size: 1.3rem;
        }

        .copy-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .result-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            line-height: 1.8;
            white-space: pre-wrap;
            border-left: 4px solid #667eea;
        }

        .error {
            display: none;
            padding: 15px;
            background: #fee;
            border-left: 4px solid #f44;
            border-radius: 8px;
            color: #c33;
            margin-bottom: 20px;
        }

        .error.active {
            display: block;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .form-container {
                padding: 25px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 SocialMind AI</h1>
            <p>LinkedIn Post Generator</p>
            <p style="font-size: 0.9rem; margin-top: 5px;">An agentic AI that thinks like a LinkedIn growth marketer</p>
        </div>

        <div class="form-container">
            <div class="error" id="error"></div>

            <form id="brandForm">
                <div class="form-group">
                    <label for="brandName">Brand Name *</label>
                    <input 
                        type="text" 
                        id="brandName" 
                        placeholder="e.g., MindNXT" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="websiteSummary">Website/Product Summary *</label>
                    <textarea 
                        id="websiteSummary" 
                        placeholder="Describe your product/service in 2-3 sentences..."
                        required
                    ></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tone">Brand Tone</label>
                        <select id="tone">
                            <option>Professional</option>
                            <option>Friendly</option>
                            <option>Bold</option>
                            <option>Thoughtful</option>
                            <option>Empathetic</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="goal">Primary Goal</label>
                        <select id="goal">
                            <option>Increase Engagement</option>
                            <option>Grow Followers</option>
                            <option>Generate Leads</option>
                            <option>Build Authority</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    🚀 Generate LinkedIn Post
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>🤖 Agent is thinking... (this may take 10-30 seconds)</p>
            </div>

            <div class="result" id="result">
                <div class="result-header">
                    <h3>✅ Post Generated!</h3>
                    <button class="copy-btn" onclick="copyToClipboard()">📋 Copy</button>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>

        <div class="footer">
            Built with <a href="https://agno.com" target="_blank">Agno</a> + Groq + Flask
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/generate';

        document.getElementById('brandForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide error and result
            document.getElementById('error').classList.remove('active');
            document.getElementById('result').classList.remove('active');

            // Get form values
            const brandName = document.getElementById('brandName').value.trim();
            const websiteSummary = document.getElementById('websiteSummary').value.trim();
            const tone = document.getElementById('tone').value;
            const goal = document.getElementById('goal').value;

            // Validate
            if (!brandName || !websiteSummary) {
                showError('Please fill in Brand Name and Website Summary');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        brand_name: brandName,
                        website_summary: websiteSummary,
                        tone: tone,
                        goal: goal
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resultContent').textContent = data.content;
                    document.getElementById('result').classList.add('active');
                } else {
                    showError(data.error || 'Failed to generate post');
                }
            } catch (error) {
                showError('Failed to connect to the API. Make sure the backend is running on http://localhost:5000');
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '⚠️ ' + message;
            errorEl.classList.add('active');
        }

        function copyToClipboard() {
            const content = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
